<script>
  // ── CONFIG EMAILJS ──
  // Invio via REST API EmailJS, senza script esterni CDN
  // Inserisci qui i valori del tuo account EmailJS
  const EMAILJS_PUBLIC_KEY = "B7mJMNjnbM-aoaYqS";
  const EMAILJS_SERVICE_ID = "service_ujx0d4k";
  const EMAILJS_TEMPLATE_ID = "template_khaumds";

  // Prima data selezionabile: 11 aprile 2026
  const minSelectableDate = new Date(2026, 3, 11);
  minSelectableDate.setHours(0, 0, 0, 0);

  // ── SLOT AVAILABILITY MAP (giorno settimana -> orari disponibili) ──
  // 0=Dom, 1=Lun, ... 6=Sab
  const slotMap = {
    1: ['18:00','18:30','19:00','19:30','20:00'],
    2: ['18:00','18:30','19:00','19:30','20:00'],
    3: ['18:00','18:30','19:00','19:30','20:00'],
    4: ['18:00','18:30','19:00','19:30','20:00'],
    5: ['18:00','18:30','19:00','19:30','20:00'],
    6: ['18:00','18:30','19:00','19:30','20:00'],
  };

  // Simulazione slot già presi (random per demo)
  const takenSlots = {};
  const BOOKING_START_DATE = new Date(2026, 3, 11); // 11 aprile 2026
  BOOKING_START_DATE.setHours(0,0,0,0);

  let currentDate = new Date(BOOKING_START_DATE);
  let viewYear = currentDate.getFullYear();
  let viewMonth = currentDate.getMonth();
  let selectedDay = null;
  let selectedSlot = null;

  const monthNames = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                      'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const dayNames = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];

  // ── CALENDARIO ──
  function renderCalendar() {
    document.getElementById('calMonth').textContent =
      monthNames[viewMonth] + ' ' + viewYear;

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    const prevButton = document.getElementById('prevMonth');
    const firstBookableMonth = new Date(BOOKING_START_DATE.getFullYear(), BOOKING_START_DATE.getMonth(), 1);
    const currentViewMonth = new Date(viewYear, viewMonth, 1);
    prevButton.disabled = currentViewMonth <= firstBookableMonth;
    prevButton.style.opacity = prevButton.disabled ? '0.45' : '1';
    prevButton.style.cursor = prevButton.disabled ? 'not-allowed' : 'pointer';

    // intestazioni giorni
    dayNames.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const today = new Date(BOOKING_START_DATE);

    // celle vuote
    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const el = document.createElement('div');
      el.className = 'cal-day';
      el.textContent = d;

      const date = new Date(viewYear, viewMonth, d);
      date.setHours(0,0,0,0);

      const dow = date.getDay();
      const isPast = date < today;

      if (isPast) {
        el.classList.add('past');
      } else if (!slotMap[dow]) {
        el.classList.add('unavailable');
      } else {
        el.classList.add('available');
        el.addEventListener('click', () => selectDay(d, date));
      }

      if (selectedDay &&
          d === selectedDay.getDate() &&
          viewMonth === selectedDay.getMonth() &&
          viewYear === selectedDay.getFullYear()) {
        el.classList.add('selected');
      }

      grid.appendChild(el);
    }

    const prevBtn = document.getElementById('prevMonth');
    const firstAllowedMonth = new Date(minSelectableDate.getFullYear(), minSelectableDate.getMonth(), 1);
    const currentViewedMonth = new Date(viewYear, viewMonth, 1);
    prevBtn.disabled = currentViewedMonth <= firstAllowedMonth;
    prevBtn.style.opacity = prevBtn.disabled ? '.45' : '1';
    prevBtn.style.cursor = prevBtn.disabled ? 'not-allowed' : 'pointer';
  }

  function selectDay(d, date) {
    selectedDay = new Date(date);
    selectedDay.setHours(0,0,0,0);
    selectedSlot = null;
    renderCalendar();
    renderSlots(date.getDay());
    updateSummary();
  }

  // ── SLOT ORARI ──
  function renderSlots(dow) {
    const grid = document.getElementById('slotsGrid');
    const placeholder = document.getElementById('slotsPlaceholder');
    const slots = slotMap[dow] || [];

    grid.innerHTML = '';
    placeholder.style.display = 'none';
    grid.style.display = 'grid';

    const dayKey = selectedDay.toDateString();
    const taken = takenSlots[dayKey] || [];

    slots.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'slot-btn' + (taken.includes(s) ? ' taken' : '');
      btn.textContent = s;
      if (!taken.includes(s)) {
        btn.addEventListener('click', () => selectSlot(s, btn));
      }
      grid.appendChild(btn);
    });
  }

  function selectSlot(slot, btn) {
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedSlot = slot;
    updateSummary();
  }

  // ── SUMMARY & VALIDATE ──
  function updateSummary() {
    const nome = document.getElementById('nome').value.trim();
    const cognome = document.getElementById('cognome').value.trim();
    const tel = document.getElementById('telefono').value.trim();
    const hasPatient = nome && cognome && tel;

    const box = document.getElementById('summaryBox');
    const btn = document.getElementById('submitBtn');

    if (selectedDay && selectedSlot) {
      box.classList.add('visible');
      const dateStr = selectedDay.toLocaleDateString('it-IT', {
        weekday:'long',
        day:'numeric',
        month:'long',
        year:'numeric'
      });
      document.getElementById('sNome').textContent = nome && cognome ? nome + ' ' + cognome : '—';
      document.getElementById('sData').textContent = dateStr;
      document.getElementById('sOrario').textContent = selectedSlot;
    } else {
      box.classList.remove('visible');
    }

    btn.disabled = !(hasPatient && selectedDay && selectedSlot);
  }

  ['nome','cognome','telefono','email'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateSummary);
  });

  // ── NAV MESI ──
  document.getElementById('prevMonth').addEventListener('click', () => {
    const candidateMonth = viewMonth - 1;
    const candidateYear = candidateMonth < 0 ? viewYear - 1 : viewYear;
    const normalizedMonth = candidateMonth < 0 ? 11 : candidateMonth;
    const candidateDate = new Date(candidateYear, normalizedMonth, 1);

    if (candidateDate < new Date(BOOKING_START_DATE.getFullYear(), BOOKING_START_DATE.getMonth(), 1)) {
      return;
    }

    viewMonth = normalizedMonth;
    viewYear = candidateYear;
    renderCalendar();
  });

  document.getElementById('nextMonth').addEventListener('click', () => {
    viewMonth++;
    if (viewMonth > 11) {
      viewMonth = 0;
      viewYear++;
    }
    renderCalendar();
  });

  // ── INVIA ──
  async function inviaRichiesta() {
    const nome = document.getElementById('nome').value.trim();
    const cognome = document.getElementById('cognome').value.trim();
    const tel = document.getElementById('telefono').value.trim();
    const email = document.getElementById('email').value.trim();
    const note = document.getElementById('note').value.trim();
    const submitBtn = document.getElementById('submitBtn');

    if ([EMAILJS_PUBLIC_KEY, EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID].some(v => v.startsWith('INSERISCI_'))) {
      alert('Configura prima EmailJS inserendo Public Key, Service ID e Template ID nel file HTML.');
      return;
    }

    const dateStr = selectedDay.toLocaleDateString('it-IT', {
      weekday:'long',
      day:'numeric',
      month:'long',
      year:'numeric'
    });

    const templateParams = {
      to_email: 'gianluca.basso@gmail.com',
      subject: `[GB Fisioterapia] Nuova richiesta – ${nome} ${cognome}`,

      nome: nome,
      cognome: cognome,
      telefono: tel,
      email: email || 'non fornita',
      data: dateStr,
      orario: selectedSlot,
      note: note || 'Nessuna nota',

      patient_name: `${nome} ${cognome}`,
      patient_phone: tel,
      patient_email: email || 'non fornita',
      appointment_date: dateStr,
      appointment_time: selectedSlot,
      notes: note || 'Nessuna nota',

      message: `Nuova richiesta di appuntamento da GB Fisioterapia Top

DATI PAZIENTE
Nome: ${nome} ${cognome}
Telefono: ${tel}
Email: ${email || 'non fornita'}

APPUNTAMENTO RICHIESTO
Data: ${dateStr}
Orario: ${selectedSlot}

NOTE
${note || 'Nessuna nota'}`
    };

    submitBtn.disabled = true;
    submitBtn.textContent = 'Invio in corso...';

    try {
      const response = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          service_id: EMAILJS_SERVICE_ID,
          template_id: EMAILJS_TEMPLATE_ID,
          user_id: EMAILJS_PUBLIC_KEY,
          template_params: templateParams
        })
      });

      const responseText = await response.text();

      if (!response.ok) {
        throw new Error(responseText || 'Errore EmailJS');
      }

      document.getElementById('formBody').style.display = 'none';
      document.getElementById('successOverlay').classList.add('visible');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (error) {
      console.error('Errore invio EmailJS:', error);
      alert('Invio non riuscito. Verifica configurazione EmailJS, template e dominio autorizzato.');
      updateSummary();
    } finally {
      submitBtn.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Invia Richiesta`;
    }
  }

  // ── INIT ──
  renderCalendar();
</script>
