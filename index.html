<script>
  // ── CONFIG EMAILJS ──
  const EMAILJS_PUBLIC_KEY = "B7mJMNjnbM-aoaYqS";
  const EMAILJS_SERVICE_ID = "service_ujx0d4k";
  const EMAILJS_TEMPLATE_ID = "template_khaumds";

  // 👉 DATA CORRETTA
  const minSelectableDate = new Date(2026, 3, 11);
  minSelectableDate.setHours(0,0,0,0);

  // ── SLOT AVAILABILITY ──
  const slotMap = {
    1: ['18:00','18:30','19:00','19:30','20:00'],
    2: ['18:00','18:30','19:00','19:30','20:00'],
    3: ['18:00','18:30','19:00','19:30','20:00'],
    4: ['18:00','18:30','19:00','19:30','20:00'],
    5: ['18:00','18:30','19:00','19:30','20:00'],
    6: ['18:00','18:30','19:00','19:30','20:00'],
  };

  const takenSlots = {};

  // 👉 DATA CORRETTA
  const BOOKING_START_DATE = new Date(2026, 3, 11);
  BOOKING_START_DATE.setHours(0,0,0,0);

  let currentDate = new Date(BOOKING_START_DATE);
  let viewYear = currentDate.getFullYear();
  let viewMonth = currentDate.getMonth();
  let selectedDay = null;
  let selectedSlot = null;

  const monthNames = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                      'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const dayNames = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];

  function renderCalendar() {
    document.getElementById('calMonth').textContent =
      monthNames[viewMonth] + ' ' + viewYear;

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    const prevButton = document.getElementById('prevMonth');
    const firstBookableMonth = new Date(BOOKING_START_DATE.getFullYear(), BOOKING_START_DATE.getMonth(), 1);
    const currentViewMonth = new Date(viewYear, viewMonth, 1);
    prevButton.disabled = currentViewMonth <= firstBookableMonth;

    dayNames.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const today = new Date(BOOKING_START_DATE);

    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const el = document.createElement('div');
      el.className = 'cal-day';
      el.textContent = d;

      const date = new Date(viewYear, viewMonth, d);
      const dow = date.getDay();
      const isPast = date < today;

      if (isPast) {
        el.classList.add('past');
      } else if (!slotMap[dow]) {
        el.classList.add('unavailable');
      } else {
        el.classList.add('available');
        el.addEventListener('click', () => selectDay(d, date));
      }

      if (selectedDay &&
          d === selectedDay.getDate() &&
          viewMonth === selectedDay.getMonth() &&
          viewYear === selectedDay.getFullYear()) {
        el.classList.add('selected');
      }

      grid.appendChild(el);
    }
  }

  function selectDay(d, date) {
    selectedDay = date;
    selectedSlot = null;
    renderCalendar();
    renderSlots(date.getDay());
    updateSummary();
  }

  function renderSlots(dow) {
    const grid = document.getElementById('slotsGrid');
    const placeholder = document.getElementById('slotsPlaceholder');
    const slots = slotMap[dow] || [];

    grid.innerHTML = '';
    placeholder.style.display = 'none';
    grid.style.display = 'grid';

    slots.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'slot-btn';
      btn.textContent = s;
      btn.addEventListener('click', () => selectSlot(s, btn));
      grid.appendChild(btn);
    });
  }

  function selectSlot(slot, btn) {
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedSlot = slot;
    updateSummary();
  }

  function updateSummary() {
    const nome = document.getElementById('nome').value.trim();
    const cognome = document.getElementById('cognome').value.trim();
    const tel = document.getElementById('telefono').value.trim();

    const box = document.getElementById('summaryBox');
    const btn = document.getElementById('submitBtn');

    if (selectedDay && selectedSlot && nome && cognome && tel) {
      box.classList.add('visible');
      btn.disabled = false;
    } else {
      box.classList.remove('visible');
      btn.disabled = true;
    }
  }

  renderCalendar();
</script>
